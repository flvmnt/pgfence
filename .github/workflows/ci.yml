name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - name: Block cloud/agent files from public repo
        run: |
          LEAKED=$(git ls-files -- 'src/cloud/' 'src/agent/' 'tests/cloud/' | head -5)
          if [ -n "$LEAKED" ]; then
            echo "::error::Cloud/agent files detected in tracked files:"
            echo "$LEAKED"
            exit 1
          fi
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/check-docs-coverage.sh
      - run: pnpm typecheck
      - run: pnpm build
      - run: ./scripts/check-public-boundaries.sh
      - run: pnpm lint
      - run: pnpm test
